<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1d3a"/>
      <stop offset="100%" stop-color="#060713"/>
    </radialGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#66f0ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#66f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#b26cff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#b26cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neonLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66f0ff"/>
      <stop offset="100%" stop-color="#b26cff"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66f0ff"/>
      <stop offset="100%" stop-color="#b26cff"/>
    </linearGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg1)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#glow1)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#roundedClip)" opacity="0.12">
    <line x1="0" y1="16" x2="64" y2="16" stroke="#66f0ff" stroke-width="0.5"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#66f0ff" stroke-width="0.5"/>
    <line x1="0" y1="48" x2="64" y2="48" stroke="#66f0ff" stroke-width="0.5"/>
    <line x1="16" y1="0" x2="16" y2="64" stroke="#b26cff" stroke-width="0.5"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#b26cff" stroke-width="0.5"/>
    <line x1="48" y1="0" x2="48" y2="64" stroke="#b26cff" stroke-width="0.5"/>
  </g>

  <!-- Calendar / schedule icon -->
  <!-- Outer frame -->
  <rect x="10" y="13" width="44" height="38" rx="5" ry="5"
        fill="none" stroke="url(#neonLine)" stroke-width="2"
        filter="url(#neonGlow)"/>

  <!-- Header bar -->
  <rect x="10" y="13" width="44" height="11" rx="5" ry="5" fill="url(#iconGrad)" opacity="0.18"/>
  <rect x="10" y="19" width="44" height="5" fill="url(#iconGrad)" opacity="0.18"/>

  <!-- Calendar rings -->
  <line x1="22" y1="10" x2="22" y2="17" stroke="#66f0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#neonGlow)"/>
  <line x1="42" y1="10" x2="42" y2="17" stroke="#b26cff" stroke-width="2.5" stroke-linecap="round" filter="url(#neonGlow)"/>

  <!-- Grid cells — row 1 -->
  <rect x="14" y="28" width="9" height="6" rx="1.5" fill="#66f0ff" opacity="0.75"/>
  <rect x="27" y="28" width="9" height="6" rx="1.5" fill="#b26cff" opacity="0.6"/>
  <rect x="40" y="28" width="10" height="6" rx="1.5" fill="#4dffb7" opacity="0.55"/>

  <!-- Grid cells — row 2 -->
  <rect x="14" y="37" width="9" height="6" rx="1.5" fill="#b26cff" opacity="0.5"/>
  <rect x="27" y="37" width="9" height="6" rx="1.5" fill="#66f0ff" opacity="0.7"/>
  <rect x="40" y="37" width="10" height="6" rx="1.5" fill="#ffcf5a" opacity="0.55"/>

  <!-- "NOW" highlight pulse ring on first cell -->
  <rect x="13" y="27" width="11" height="8" rx="2" fill="none"
        stroke="#66f0ff" stroke-width="1" opacity="0.9" filter="url(#neonGlow)"/>

  <!-- Top neon accent line -->
  <line x1="10" y1="24" x2="54" y2="24" stroke="url(#neonLine)" stroke-width="1" opacity="0.6"/>
</svg>
